name: Deploy asset-editor to Dev

# Standalone deploy for the asset-editor, moved out of the ai-story-gen repo.
# Push to main -> lint -> build & push the single image to GHCR -> SSH to the
# dev VPS, reset this repo's server checkout, and `docker compose up`.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-asset-editor
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/otabekeshpulatov/asset-editor-fabrolabs

jobs:
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:dev
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        env:
          # Image tag (the just-built commit) + GHCR auth for VPS pulls.
          IMAGE_TAG: ${{ github.sha }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GHCR_USER: ${{ vars.GHCR_USER || 'OtabekEshpulatov' }}
          # Storage the editor auto-connects to on startup (S3 / MinIO).
          MINIO_ENDPOINT_URL: ${{ vars.MINIO_ENDPOINT_URL }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          MINIO_BUCKET: ${{ vars.MINIO_BUCKET }}
          # Host port the editor is published on (defaults to 7777).
          ASSET_EDITOR_PORT: ${{ vars.ASSET_EDITOR_PORT }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: IMAGE_TAG,GHCR_PAT,GHCR_USER,MINIO_ENDPOINT_URL,MINIO_ACCESS_KEY,MINIO_SECRET_KEY,MINIO_BUCKET,ASSET_EDITOR_PORT
          script: |
            set -e
            # Sync the server checkout BEFORE running deploy.sh: a git reset
            # inside the script would rewrite the file bash is executing mid-run.
            cd ${{ vars.ASSET_EDITOR_DIR || '/opt/asset-editor' }}
            git fetch origin main
            git reset --hard origin/main
            bash scripts/deploy.sh
